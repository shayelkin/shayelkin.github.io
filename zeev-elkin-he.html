    <h1>הבהרה</h1>
    <p> כפי שאני נאלץ לעשות מדי פעם, אני מבקש להזכיר כי אין ביני ובין ח״כ זאב אלקין דבר פרט לשם המשפחה הזהה, שאין מקורו בקרבה משפחתית. </p>
<p> אני מחזיק שעליו לשנות את שם משפחתו, כיוון שמעשיו אינם מוסיפים דבר למוניטין הטוב שיצא לשם אלקין,
  אלא להפך.</p>
